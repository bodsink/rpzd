{{template "base.html" .}}

{{define "title"}}Change Password — rpzd{{end}}
{{define "content"}}
<div class="max-w-lg mx-auto">
  <div class="mb-6">
    <h1 class="text-xl font-bold text-slate-800">Change Password</h1>
    <p class="text-sm text-slate-500 mt-1">Update the password for <strong>{{.User.Username}}</strong></p>
  </div>

  <div class="card">
    <form method="POST" action="/profile" class="p-6 space-y-5">
      <input type="hidden" name="csrf_token" value="{{.CSRFToken}}"/>

      <div>
        <label class="form-label" for="current_password">Current Password</label>
        <input id="current_password" name="current_password" type="password" required
               class="form-input" placeholder="Enter current password"/>
      </div>

      <div>
        <label class="form-label" for="new_password">New Password</label>
        <input id="new_password" name="new_password" type="password" required
               class="form-input" placeholder="At least 8 characters"/>
      </div>

      <div>
        <label class="form-label" for="confirm_password">Confirm New Password</label>
        <input id="confirm_password" name="confirm_password" type="password" required
               class="form-input" placeholder="Repeat new password"/>
      </div>

      {{if .FormError}}
      <p class="text-sm text-red-600 font-medium">{{.FormError}}</p>
      {{end}}

      <div class="flex items-center gap-3 pt-1">
        <button type="submit" class="btn btn-primary">Update Password</button>
        <a href="/" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{{end}}
